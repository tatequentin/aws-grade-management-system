<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KSU Grade Calculator - Results</title>
</head>
<body>
  <h2>Saved Grades</h2>

  <p><strong>Average grade:</strong> {{ avg_grade }}</p>

  <a href="/">Enter another</a>

  <br><br>

  <table border="1">
    <tr>
      <th>Student ID</th>
      <th>Grade</th>
    </tr>
    {% for r in rows %}
    <tr>
      <td>{{ r.student_id }}</td>
      <td>{{ r.grade }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
